<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Elite - Monitoramento</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 10px; border-radius: 10px; margin-bottom: 5px; position: relative; line-height: 1.4; }
        .CLIENTE { align-self: flex-start; background: white; color: #303030; border: 1px solid #ddd; }
        .BOT { align-self: flex-end; background: #dcf8c6; color: #303030; }
        .meta { font-size: 0.7em; margin-top: 5px; display: block; opacity: 0.6; }
        .phone { font-weight: bold; font-size: 0.8em; display: block; margin-bottom: 3px; color: #075e54; }
    </style>
</head>
<body>

<header>📊 Monitoramento de Conversas - Elite Bot</header>

<div id="chat-container">
    </div>

<script>
    // Configuração do seu Firebase (Exatamente como no seu bot.js)
    const firebaseConfig = {
        apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
        databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const container = document.getElementById('chat-container');

    // Escutar novas mensagens no Firebase
    db.ref('respostas').limitToLast(50).on('value', (snapshot) => {
        container.innerHTML = ""; // Limpa para atualizar
        const dados = snapshot.val();
        
        if (!dados) return;

        // Organizar mensagens por data
        let mensagensArray = [];
        Object.keys(dados).forEach(phone => {
            Object.keys(dados[phone]).forEach(id => {
                mensagensArray.push({
                    phone: phone,
                    ...dados[phone][id],
                    timestamp: id
                });
            });
        });

        // Ordenar pela mais recente
        mensagensArray.sort((a, b) => a.timestamp - b.timestamp);

        mensagensArray.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.tipo}`;
            div.innerHTML = `
                <span class="phone">📱 ${m.phone}</span>
                ${m.mensagem}
                <span class="meta">${m.data}</span>
            `;
            container.appendChild(div);
        });

        // Rolar para o final automaticamente
        container.scrollTop = container.scrollHeight;
    });
</script>

</body>
</html>
