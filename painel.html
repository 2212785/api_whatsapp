<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Elite - Monitoramento Estilo WhatsApp</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #dadbd3; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .app-container { background: #f0f2f5; width: 100%; max-width: 1600px; height: 95vh; display: flex; box-shadow: 0 6px 18px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; }

        /* Coluna Esquerda: Lista de Contatos */
        .sidebar { width: 35%; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; min-width: 300px; }
        .sidebar-header { background: #f0f2f5; padding: 15px; font-weight: bold; color: #075e54; border-bottom: 1px solid #ddd; }
        .contact-list { flex: 1; overflow-y: auto; }
        .contact-item { padding: 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
        .contact-item:hover { background: #f5f6f6; }
        .contact-item.active { background: #ebebeb; }
        .contact-info { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .contact-phone { font-weight: 600; color: #111; }
        .contact-time { font-size: 0.75em; color: #667781; }
        .contact-last-msg { font-size: 0.85em; color: #667781; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Coluna Direita: Janela de Chat */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #e5ddd5 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .chat-header { background: #f0f2f5; padding: 10px 20px; display: flex; align-items: center; border-bottom: 1px solid #ddd; height: 60px; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Balões de Mensagem */
        .balao { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .CLIENTE { align-self: flex-start; background: #fff; border-top-left-radius: 0; }
        .BOT { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .msg-meta { font-size: 0.7em; margin-top: 4px; display: block; text-align: right; opacity: 0.5; }

        .empty-state { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; color: #667781; }
        
        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <div class="sidebar-header">Conversas Elite Bot</div>
        <div id="contact-list" class="contact-list">
            </div>
    </div>
    
    <div class="main-chat" id="main-chat">
        <div class="empty-state">
            <h3>Selecione uma conversa para monitorar</h3>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
        databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let conversaAtiva = null;
    let todasConversas = {};

    // Escutar mudanças no Firebase
    db.ref('respostas').on('value', (snapshot) => {
        todasConversas = snapshot.val() || {};
        renderizarContatos();
        if (conversaAtiva) {
            abrirConversa(conversaAtiva);
        }
    });

    function renderizarContatos() {
        const listContainer = document.getElementById('contact-list');
        listContainer.innerHTML = "";
        
        // Ordenar contatos pela mensagem mais recente
        const sortedPhones = Object.keys(todasConversas).sort((a, b) => {
            const lastA = Object.keys(todasConversas[a]).sort().pop();
            const lastB = Object.keys(todasConversas[b]).sort().pop();
            return lastB - lastA;
        });

        sortedPhones.forEach(phone => {
            const msgs = todasConversas[phone];
            const lastId = Object.keys(msgs).sort().pop();
            const ultimaMsg = msgs[lastId];

            const item = document.createElement('div');
            item.className = `contact-item ${conversaAtiva === phone ? 'active' : ''}`;
            item.onclick = () => abrirConversa(phone);
            
            item.innerHTML = `
                <div class="contact-info">
                    <span class="contact-phone">${phone}</span>
                    <span class="contact-time">${ultimaMsg.data.split(' ')[1] || ''}</span>
                </div>
                <div class="contact-last-msg">${ultimaMsg.mensagem}</div>
            `;
            listContainer.appendChild(item);
        });
    }

    function abrirConversa(phone) {
        conversaAtiva = phone;
        const chatContainer = document.getElementById('main-chat');
        const msgs = todasConversas[phone];
        const sortedIds = Object.keys(msgs).sort();

        // Re-renderizar Sidebar para marcar o ativo
        renderizarContatos();

        let chatHtml = `
            <div class="chat-header">📱 ${phone}</div>
            <div class="chat-messages" id="chat-messages">
        `;

        sortedIds.forEach(id => {
            const m = msgs[id];
            chatHtml += `
                <div class="balao ${m.tipo}">
                    ${m.mensagem.replace(/\n/g, '<br>')}
                    <span class="msg-meta">${m.data}</span>
                </div>
            `;
        });

        chatHtml += `</div>`;
        chatContainer.innerHTML = chatHtml;

        const msgDiv = document.getElementById('chat-messages');
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }
</script>

</body>
</html>
