<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Elite - Monitoramento por Cliente</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e5ddd5; margin: 0; padding: 20px; }
        header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        #painel-clientes { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .card-cliente { background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 450px; border: 1px solid #ccc; }
        .card-header { background: #f0f2f5; padding: 12px; border-bottom: 1px solid #ddd; border-radius: 10px 10px 0 0; font-weight: bold; color: #075e54; display: flex; justify-content: space-between; }
        
        .chat-window { flex: 1; overflow-y: auto; padding: 15px; background: #efe7de; display: flex; flex-direction: column; gap: 8px; }
        
        .balao { max-width: 85%; padding: 8px 12px; border-radius: 8px; font-size: 0.9em; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .CLIENTE { align-self: flex-start; background: #fff; color: #000; border-bottom-left-radius: 2px; }
        .BOT { align-self: flex-end; background: #dcf8c6; color: #000; border-bottom-right-radius: 2px; }
        
        .hora { font-size: 0.7em; display: block; text-align: right; margin-top: 4px; opacity: 0.6; }
        .status-tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; background: #075e54; color: white; }
    </style>
</head>
<body>

<header>📊 Monitoramento de Conversas Elite (Separado por Número)</header>

<div id="painel-clientes">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyANz1gbAi3PIGwS1-RzOIXF6SUZvS2U0mU",
        databaseURL: "https://agenda-album-de-formatura-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const container = document.getElementById('painel-clientes');

    // Escuta o nó principal "respostas"
    db.ref('respostas').on('value', (snapshot) => {
        container.innerHTML = ""; 
        const todosDados = snapshot.val();
        
        if (!todosDados) return;

        // Itera sobre cada número de telefone
        Object.keys(todosDados).forEach(telefone => {
            const mensagensDoNumero = todosDados[telefone];
            
            // Criar o Card do Cliente
            const card = document.createElement('div');
            card.className = 'card-cliente';
            
            const header = document.createElement('div');
            header.className = 'card-header';
            header.innerHTML = `<span>📱 ${telefone}</span> <span class="status-tag">Ativo</span>`;
            
            const window = document.createElement('div');
            window.className = 'chat-window';
            
            // Transformar mensagens em array para ordenar por tempo
            let msgsArray = Object.keys(mensagensDoNumero).map(id => ({
                id: id,
                ...mensagensDoNumero[id]
            }));
            
            msgsArray.sort((a, b) => a.id - b.id);

            // Adicionar cada balão no chat do card
            msgsArray.forEach(m => {
                const balao = document.createElement('div');
                balao.className = `balao ${m.tipo}`;
                balao.innerHTML = `
                    ${m.mensagem}
                    <span class="hora">${m.data || ''}</span>
                `;
                window.appendChild(balao);
            });

            card.appendChild(header);
            card.appendChild(window);
            container.appendChild(card);
            
            // Rolar cada chat para o final
            window.scrollTop = window.scrollHeight;
        });
    });
</script>

</body>
</html>
